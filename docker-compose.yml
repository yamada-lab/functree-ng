version: "3.8"
services:
  app:
    build: .
    volumes:
      - /workspace/bioviz.tokyo/functree-ng-data/ortholog_mapping/:/app/functree/static/data/ortholog_mapping/
    depends_on:
      - db
    ports:
      - "8080:8080"
    command: uwsgi --ini /app/uwsgi.ini
    environment:
      - MONGODB_HOST=mongodb://db:27017/functree?tz_aware=true&uuidRepresentation=standard

  db:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    command: mongod

volumes:
  mongo_data:
