services:
  app:
    build: .
    volumes:
      - .:/app
      # Pin built frontend dirs from the image so the bind-mount doesn't hide them
      - yarn_components:/app/functree/static/yarn_components
      - dist:/app/functree/static/dist
      - node_modules:/app/node_modules
    depends_on:
      - db
    ports:
      - "5000:5000"
    command: python3 /app/run.py
    environment:
      - MONGODB_HOST=mongodb://db:27017/functree?tz_aware=true&uuidRepresentation=pythonLegacy
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0

  db:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    command: mongod

volumes:
  mongo_data:
  yarn_components:
  dist:
  node_modules:
